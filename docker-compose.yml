services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ebusatis-postgres
    ports:
      - "7232:5432"
    environment:
      POSTGRES_USER: ebusatis_user
      POSTGRES_PASSWORD: ebusatis_pass
      POSTGRES_DB: ebusatis_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ebusatis-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ebusatis-redis
    ports:
      - "7233:6379"
    volumes:
      - redis_data:/data
    networks:
      - ebusatis-network

volumes:
  postgres_data:
  redis_data:

networks:
  ebusatis-network:
    driver: bridge

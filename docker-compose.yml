services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ebusatis-postgres
    ports:
      - "7232:5432"
    environment:
      POSTGRES_USER: ebusatis_user
      POSTGRES_PASSWORD: ebusatis_pass
      POSTGRES_DB: ebusatis_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ebusatis-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ebusatis-redis
    ports:
      - "7233:6379"
    volumes:
      - redis_data:/data
    networks:
      - ebusatis-network

  # MinIO (S3-uyumlu Object Storage — dosya yukleme icin)
  minio:
    image: minio/minio:latest
    container_name: ebusatis-minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console (Web UI)
    environment:
      MINIO_ROOT_USER: ebusatis_minio
      MINIO_ROOT_PASSWORD: ebusatis_minio_secret
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - ebusatis-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  ebusatis-network:
    driver: bridge
